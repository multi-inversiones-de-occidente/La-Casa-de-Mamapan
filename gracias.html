<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F5F0E8" />
  <title>Gracias | La Casa de Mamapán</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="margin:0; background:#F5F0E8; color:#1E1B16; font-family:'Poppins', sans-serif;">
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div style="
      width:100%;
      max-width:680px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(30,27,22,.10);
      border-radius:28px;
      box-shadow:0 22px 60px rgba(0,0,0,.10);
      padding:40px 32px;
      text-align:center;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    ">
      <p style="margin:0 0 10px; letter-spacing:.16em; text-transform:uppercase; font-size:12px; color:#6B6258;">
        Mensaje enviado
      </p>

      <h1 style="
        margin:0 0 16px;
        font-family:'Playfair Display', serif;
        font-size:clamp(34px, 5vw, 52px);
        line-height:1.1;
        color:#1E1B16;
      ">
        Gracias por contactarnos
      </h1>

      <p style="
        margin:0 auto 22px;
        max-width:520px;
        font-size:15px;
        line-height:1.7;
        color:#6B6258;
      ">
        Su mensaje fue enviado correctamente. Muy pronto nos pondremos en contacto con usted.
      </p>

      <a href="index.html" style="
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-width:220px;
        height:52px;
        padding:0 18px;
        border-radius:999px;
        background:linear-gradient(135deg, #1F6F4A, #195C3E);
        color:#fff;
        text-decoration:none;
        font-size:14px;
        font-weight:600;
        letter-spacing:.02em;
        box-shadow:0 16px 36px rgba(31,111,74,.24);
      ">
        Volver al inicio
      </a>
    </div>
  </div>
</body>
</html>
